<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Medicine Interaction Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>💊 Medicine Interaction Checker</h2>

    <form method="POST">
        <input type="text" name="med1" placeholder="Enter first medicine" required><br>
        <input type="text" name="med2" placeholder="Enter second medicine" required><br>
        <button type="submit">Check Interaction</button>
    </form>

    {% if result %}
        <div class="result">
            <p>{{ result|safe }}</p>
        </div>
    {% endif %}
</div>

</body>
</html>
