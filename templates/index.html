<!DOCTYPE html>
<html>
<head>
    <title>Medicine Interaction Checker</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #3a8dde;
        }

        .suggestions {
            text-align: left;
            border: 1px solid #ddd;
            background: white;
            max-height: 120px;
            overflow-y: auto;
        }

        .suggestions div {
            padding: 8px;
            cursor: pointer;
        }

        .suggestions div:hover {
            background: #eee;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }

        .warning {
            font-size: 12px;
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>💊 Medicine Interaction Checker</h2>
    
    <p style="font-size:14px;color:#555;margin-bottom:15px;">
    In Bangladesh, self-medication is common, which can lead to dangerous drug interactions. 
    This system helps users identify risks and improve patient safety.
    </p>

    <input id="med1" placeholder="First medicine" onkeyup="suggest(1)">
    <div id="s1" class="suggestions"></div>

    <input id="med2" placeholder="Second medicine" onkeyup="suggest(2)">
    <div id="s2" class="suggestions"></div>

    <button onclick="check()">Check Interaction</button>

    <div class="result" id="result"></div>

    <!-- Ethical warning -->
    <div class="warning">
        ⚠️ This tool is for educational purposes only. Consult a doctor.
    </div>
</div>

<script>
function suggest(box){
    let val = document.getElementById(box==1?"med1":"med2").value;

    if(val.length === 0){
        document.getElementById(box==1?"s1":"s2").innerHTML = "";
        return;
    }

    fetch("/suggest?q=" + val)
    .then(res => res.json())
    .then(data => {
        let html = "";
        data.forEach(d => {
            html += `<div onclick="selectMed(${box}, '${d}')">${d}</div>`;
        });
        document.getElementById(box==1?"s1":"s2").innerHTML = html;
    });
}

function selectMed(box, val){
    document.getElementById(box==1?"med1":"med2").value = val;
    document.getElementById(box==1?"s1":"s2").innerHTML = "";
}

function check(){
    let m1 = document.getElementById("med1").value;
    let m2 = document.getElementById("med2").value;

    fetch("/check", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({med1:m1, med2:m2})
    })
    .then(res => res.json())
    .then(data => {
        let resultBox = document.getElementById("result");

        resultBox.innerText = data.result;

        // 🔥 COLOR LOGIC ADDED
        if(data.result.includes("⚠️")){
            resultBox.style.color = "red";
        } else {
            resultBox.style.color = "green";
        }
    });
}
</script>

</body>
</html>
